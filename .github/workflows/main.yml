name: Controlled ML Pipeline

on:
  push:
    branches:
      - "*" 

jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Linter
        run: pip install flake8

      - name: Run Linter
        # We catch syntax errors (E9, F63, etc.) but ignore long lines for now
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-line-length=127 --statistics

  train:
    runs-on: ubuntu-latest
    needs: linter
    if: |
      github.ref == 'refs/heads/main' &&     
      contains(github.event.head_commit.message, '[run-train]')
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow scikit-learn pandas
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Train Model
        run: python -u train.py

      - name: Upload Success Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: training-output
          path: model_info.txt

      - name: Upload Error Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: training-error-logs
          # This captures the output if the script fails
          path: |
            *.log
            *.txt
