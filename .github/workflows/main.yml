# .github/workflows/pipeline.yaml
name: Controlled ML Pipeline

on:
  push:
    branches:
      - "*"

jobs:
  # LINTER JOB
  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Linter
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run Linter
        # We exclude common non-source directories to prevent unnecessary failures
        # --extend-ignore=E501 prevents failure on long lines (common in ML)
        run: |
          flake8 . --count --exclude=.git,__pycache__,docs,old,build,dist --extend-ignore=E501 --statistics

  # TRAIN JOB
  train:
    runs-on: ubuntu-latest
    needs: linter
    # Simplified logic: if linter passed AND we are on main AND message has tag
    if: |
      always() && 
      needs.linter.result == 'success' &&
      github.ref == 'refs/heads/main' &&     
      contains(github.event.head_commit.message, '[run-train]')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Train Model (GPU Job)
        run: |
          echo "Running expensive training job..."
          # Ensure train.py exists before running to avoid immediate exit
          if [ -f train.py ]; then python train.py; else echo "train.py not found"; exit 1; fi

      # FAILURE HANDLING
      - name: Save Error Logs
        if: failure()
        run: |
          echo "Training failed at $(date)" > error_logs.txt

      - name: Upload Error Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.txt

      # CLEANUP
      - name: Cleanup Resources
        if: always()
        run: |
          echo "Cleaning up temporary cloud volumes..."
