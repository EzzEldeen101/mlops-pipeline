name: Controlled ML Pipeline

on:
  push:
    branches:
      - "*" 

jobs:
  # LINTER JOB
  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Linter
        run: pip install flake8

      - name: Run Linter
        # We check for syntax errors and common issues
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # TRAIN JOB
  train:
    runs-on: ubuntu-latest
    needs: linter
    if: |
      github.ref == 'refs/heads/main' &&     
      contains(github.event.head_commit.message, '[run-train]')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Explicitly install these to ensure the script has what it needs
          pip install mlflow scikit-learn pandas
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Train Model
        run: |
          # We use -u to get unbuffered logs so you can see exactly where it fails
          python -u train.py
          
      - name: Upload Success Artifact
        uses: actions/upload-artifact@v4
        with:
          name: training-output
          path: model_info.txt
      # FAILURE HANDLING
      - name: Upload Error Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: training-error-logs
          path: error_logs.txt

      # CLEANUP
      - name: Cleanup Resources
        if: always()
        run: |
          echo "Cleaning up temporary cloud volumes..."
