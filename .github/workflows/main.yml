name: Controlled ML Pipeline

on:
  push:
    branches:
      - "*" 

jobs:
  # LINTER JOB
  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Linter
        run: pip install flake8

      - name: Run Linter
        # Redirecting to file so the artifact upload has a file to grab
        run: |
          flake8 . --count --exit-zero --max-line-length=127 --statistics > linter_report.txt

      - name: Upload Linter Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linter-results
          path: linter_report.txt

  # TRAIN JOB
  train:
    runs-on: ubuntu-latest
    needs: linter
    # REMOVED the commit message check so it runs every time on main
    if: |
      always() && 
      needs.linter.result == 'success' &&
      github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Train Model (GPU Job)
        id: train_step
        run: |
          echo "Running expensive training job..."
          # FORCING FAILURE: This ensures the next 'if: failure()' step triggers
          python train.py || (echo "Training script crashed with exit code $?" > error_logs.txt && exit 1)

      # FAILURE HANDLING
      - name: Upload Error Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: training-error-logs
          path: error_logs.txt

      # CLEANUP
      - name: Cleanup Resources
        if: always()
        run: |
          echo "Cleaning up temporary cloud volumes..."
