# .github/workflows/pipeline.yaml
name: Controlled ML Pipeline

on:
  push:
    branches:
      - "*" 
 
jobs:
  # LINTER JOB
  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Linter
        run: |
          pip install flake8

      - name: Run Linter
        # --exit-zero makes the job pass even if there are style warnings
        # This allows you to see the logs and fix them later without blocking 'train'
        run: |
          flake8 . --count --exit-zero --max-line-length=127 --statistics
      # THIS STEP IS THE KEY
      - name: Upload Linter Artifact
        if: always()  # This ensures the artifact is saved even if Run Linter failed
        uses: actions/upload-artifact@v4
        with:
          name: linter-results
          path: linter_report.txt  train:
    runs-on: ubuntu-latest
    needs: linter
    # Simplified logic: if linter passed AND we are on main AND message has tag
    if: |
      always() && 
      needs.linter.result == 'success' &&
      github.ref == 'refs/heads/main' &&     
      contains(github.event.head_commit.message, '[run-train]')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Train Model (GPU Job)
        run: |
          echo "Running expensive training job..."
          # Ensure train.py exists before running to avoid immediate exit
          if [ -f train.py ]; then python train.py; else echo "train.py not found"; exit 1; fi

      # FAILURE HANDLING
      - name: Save Error Logs
        if: failure()
        run: |
          echo "Training failed at $(date)" > error_logs.txt

      - name: Upload Error Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.txt

      # CLEANUP
      - name: Cleanup Resources
        if: always()
        run: |
          echo "Cleaning up temporary cloud volumes..."
