# .github/workflows/pipeline.yaml
name: Controlled ML Pipeline

on:
  push:
    branches:
      - "*"
 
jobs:
 
  # =========================
  # 1) LINTER JOB (LIGHTWEIGHT)
  # =========================
  linter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Linter
        run: |
          pip install flake8

      - name: Run Linter
        run: |
          flake8 . || exit 1


  # =========================
  # 2) TRAIN JOB (EXPENSIVE - GUARDED)
  # =========================
  train:
    runs-on: ubuntu-latest

    # 🔥 Gatekeeper Logic
    needs: linter
    if: >
      needs.linter.result == 'success' &&
      github.ref == 'refs/heads/main' &&
      contains(github.event.head_commit.message, '[run-train]')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      # 🔹 Simulate expensive training
      - name: Train Model (GPU Job)
        run: |
          echo "Running expensive training job..."
          python train.py || exit 1

      # =========================
      # FAILURE HANDLING
      # =========================
      - name: Save Error Logs
        if: failure()
        run: |
          echo "Training failed. Check logs." > error_logs.txt

      - name: Upload Error Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.txt

      # =========================
      # CLEANUP (ALWAYS RUNS)
      # =========================
      - name: Cleanup Resources
        if: always()
        run: |
          echo "Cleaning up temporary cloud volumes..."
