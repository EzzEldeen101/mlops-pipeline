# .github/workflows/ml-pipeline.yml
name: ML Model CI/CD Pipeline

on:
  push:
    branches-ignore:
      - main
  pull_request:

jobs:

  # VALIDATION JOB
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mlflow dvc

      # 🔹 Pull dataset (DVC)
      - name: Pull Data
        run: |
          dvc pull || echo "No DVC remote configured"

      # 🔹 Train model + log to MLflow
      - name: Train Model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          python train.py

      # 🔹 Ensure model_info.txt exists
      - name: Export Run ID
        run: |
          if [ ! -f model_info.txt ]; then
            echo "model_info.txt not found!"
            exit 1
          fi

      # 🔹 Upload artifact (REQUIRED)
      - name: Upload Model Info
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

      # 🔹 Upload README (assignment requirement)
      - name: Upload README Artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-doc
          path: README.md


  # DEPLOYMENT JOB
  deploy:
    runs-on: ubuntu-latest
    needs: validate   # 🔥 depends on validation

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install mlflow

      # 🔹 Download artifact
      - name: Download Model Info
        uses: actions/download-artifact@v4
        with:
          name: model-info

      # 🔹 Check performance threshold
      - name: Check Accuracy Threshold
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          python check_threshold.py

      # 🔹 Mock Docker build (only runs if above step passes)
      - name: Mock Docker Build
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"